<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- ✅ Favicon (fixed) -->
    <link rel="icon" href="/favicon.ico?v=1" />
    <link rel="shortcut icon" href="/favicon.ico?v=1" />
    <link rel="apple-touch-icon" href="/favicon.ico" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    
    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://wa.me" />
    
    <!-- ❌ Removed useless preload for favicon/logo -->

    <!-- SEO Meta Tags -->
    <title>Nem's Service | Premier Service d'Impression et Design au Cameroun</title>
    <meta name="description" content="Nem's Service - N°1 du service d'impression et design au Cameroun. Leader en impression professionnelle, design graphique et articles de bureau à Yaoundé, Douala et dans toute l'Afrique centrale." />
    
    <!-- ⚠️ Slight cleanup (not required but better) -->
    <meta name="keywords" content="impression cameroun, design cameroun, impression Yaoundé, impression Douala, design graphique cameroun, fournitures bureau cameroun, photocopie, reliure" />
    
    <meta name="author" content="Nem's Service" />
    <meta name="robots" content="index, follow" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://nemsservices.com" />
    
    <!-- Language -->
    <meta http-equiv="content-language" content="fr" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="Nem's Service | Impression & Design Cameroun" />
    <meta property="og:description" content="Service d'impression et design professionnel au Cameroun." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nemsservices.com" />
    <meta property="og:image" content="https://nemsservices.com/logo_nems.webp" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nem's Service" />
    <meta name="twitter:description" content="Impression & design au Cameroun" />
    <meta name="twitter:image" content="https://nemsservices.com/logo_nems.webp" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Minimal Critical CSS -->
    <style>
      html { scroll-behavior: smooth; }
      body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
      #root { min-height: 100vh; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
